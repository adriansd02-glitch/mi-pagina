<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti ❤️ Sandra</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* ======================================
   🎬 PANTALLA DE INICIO DECORADA
====================================== */
.pantalla-inicio {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, #12001a 0%, #000000 75%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  transition: opacity 0.8s ease;
  overflow: hidden;
}

.estrellas-portada {
  position: absolute;
  width: 100%;
  height: 100%;
}

.estrella {
  position: absolute;
  border-radius: 50%;
  background: #ffffff;
  animation: parpadeo 3s ease-in-out infinite;
}

@keyframes parpadeo {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 1; }
}

.corazon-deco {
  position: absolute;
  color: #ff4466;
  font-size: 20px;
  animation: flotar 12s linear infinite;
  opacity: 0.6;
}

@keyframes flotar {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.7; }
  90% { opacity: 0.7; }
  100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
}

.pantalla-inicio h1 {
  color: #ffaa33;
  font-size: 46px;
  text-shadow: 0 0 15px #ffaa33, 0 0 30px #ffdd66;
  margin-bottom: 25px;
  animation: brillar 4s ease-in-out infinite alternate;
  z-index: 10;
}

.pantalla-inicio p {
  color: #ffddaa;
  font-size: 20px;
  margin-bottom: 50px;
  text-shadow: 0 0 8px #ffaa33;
  z-index: 10;
}

@keyframes brillar {
  from { filter: brightness(1); }
  to { filter: brightness(1.5); }
}

.boton-iniciar {
  padding: 18px 45px;
  font-size: 24px;
  font-weight: bold;
  color: #ffffff;
  background: linear-gradient(45deg, #ff8822, #ffcc33);
  border: none;
  border-radius: 60px;
  box-shadow: 0 0 20px #ff8822, 0 0 40px rgba(255, 136, 34, 0.6);
  cursor: pointer;
  transition: all 0.3s ease;
  z-index: 10;
}

.boton-iniciar:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px #ff8822, 0 0 50px rgba(255, 136, 34, 0.8);
}

/* ======================================
   ✨ PANTALLA PRINCIPAL - IGUAL A LA IMAGEN
====================================== */
.contenido-principal {
  width: 100%;
  height: 100%;
  position: relative;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.8s ease;
  background: #000;
}

/* Fondo de galaxia */
.fondo-galaxia {
  width: 100%;
  height: 100%;
  background: radial-gradient(ellipse at center,
    #1a0033 0%,
    #220044 20%,
    #000022 40%,
    #000000 70%);
  position: absolute;
  top: 0;
  left: 0;
  overflow: hidden;
}

/* Nebulosa de colores */
.nebulosa {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 30% 40%,
    rgba(255, 80, 30, 0.3) 0%,
    rgba(255, 120, 50, 0.15) 20%,
    rgba(80, 120, 255, 0.12) 40%,
    rgba(20, 200, 255, 0.08) 60%,
    transparent 80%),
  radial-gradient(circle at 70% 60%,
    rgba(255, 100, 40, 0.25) 0%,
    rgba(255, 150, 60, 0.12) 25%,
    rgba(255, 60, 180, 0.1) 50%,
    transparent 75%);
  filter: blur(15px);
}

/* Estrellas brillantes */
.estrella-fondo {
  position: absolute;
  border-radius: 50%;
  background: #ffffff;
}

/* Texto principal */
.texto-centro {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 20;
}

.te-amo {
  font-size: 52px;
  font-weight: bold;
  color: #ffaa33;
  text-shadow:
    0 0 8px #ffaa33,
    0 0 16px #ffaa33,
    0 0 28px #ff8822,
    0 0 40px #ff6600;
  margin-bottom: 8px;
  animation: parpadearTexto 4s ease-in-out infinite alternate;
}

.sandra {
  font-size: 60px;
  font-weight: bold;
  color: #ffaa33;
  text-shadow:
    0 0 8px #ffaa33,
    0 0 16px #ffaa33,
    0 0 28px #ff8822,
    0 0 40px #ff6600;
  animation: parpadearTexto 4s ease-in-out infinite alternate;
}

@keyframes parpadearTexto {
  from { filter: brightness(1); }
  to { filter: brightness(1.4); }
}

/* Frase pequeña como en la imagen */
.frase-arriba {
  font-size: 14px;
  color: #ffddaa;
  margin-bottom: 15px;
  text-shadow: 0 0 5px #ff8822;
  opacity: 0.9;
}

/* Fotos moviéndose */
.foto {
  position: absolute;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 0 12px #ffaa33, 0 0 24px rgba(255,170,51,0.5);
  z-index: 10;
}

.foto img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Frases que suben */
.frase {
  position: absolute;
  color: #ffffff;
  font-size: 12px;
  text-shadow: 0 0 5px #ffaa33;
  animation: subir 8s linear forwards;
  z-index: 5;
}

@keyframes subir {
  0% { bottom: -50px; opacity: 0; }
  20% { opacity: 0.8; }
  80% { opacity: 0.8; }
  100% { bottom: 120vh; opacity: 0; }
}
</style>
</head>
<body>

<!-- 🎬 PANTALLA DE INICIO -->
<div class="pantalla-inicio" id="pantallaInicio">
  <div class="estrellas-portada" id="estrellasPortada"></div>
  <h1>Para ti ❤️</h1>
  <p>Un universo lleno de amor</p>
  <button class="boton-iniciar" id="botonIniciar">INICIAR</button>
</div>

<!-- ✨ PANTALLA PRINCIPAL -->
<div class="contenido-principal" id="contenidoPrincipal">
  <div class="fondo-galaxia">
    <div class="nebulosa"></div>
    <div id="estrellasGalaxia"></div>
  </div>

  <div class="texto-centro">
    <div class="frase-arriba">Contigo todo es mejor</div>
    <div class="te-amo">TE AMO</div>
    <div class="sandra">SANDRA</div>
  </div>

  <div class="foto" id="img1"><img src="san 3.jpeg" alt=""></div>
  <div class="foto" id="img2"><img src="san1.jpeg" alt=""></div>
  <div class="foto" id="img3"><img src="san 2.jpeg" alt=""></div>
  <div class="foto" id="img4"><img src="sam 5.jpeg" alt=""></div>
  <div class="foto" id="img5"><img src="san6.jpeg" alt=""></div>
</div>

<script>
// 🎨 DECORACIÓN PORTADA
const contenedorEstrellas = document.getElementById("estrellasPortada");
for (let i = 0; i < 500; i++) {
  const estrella = document.createElement("div");
  estrella.classList.add("estrella");
  const tamaño = Math.random() * 2 + 0.5;
  estrella.style.width = tamaño + "px";
  estrella.style.height = tamaño + "px";
  estrella.style.left = Math.random() * 100 + "%";
  estrella.style.top = Math.random() * 100 + "%";
  estrella.style.animationDelay = Math.random() * 3 + "s";
  contenedorEstrellas.appendChild(estrella);
}

setInterval(() => {
  const corazon = document.createElement("div");
  corazon.classList.add("corazon-deco");
  corazon.textContent = "❤️";
  corazon.style.left = Math.random() * 100 + "%";
  corazon.style.fontSize = (Math.random() * 15 + 15) + "px";
  corazon.style.animationDuration = (Math.random() * 5 + 8) + "s";
  document.getElementById("pantallaInicio").appendChild(corazon);
  setTimeout(() => corazon.remove(), 12000);
}, 800);

// 🎯 CAMBIO DE PANTALLA
const pantallaInicio = document.getElementById("pantallaInicio");
const contenidoPrincipal = document.getElementById("contenidoPrincipal");
const botonIniciar = document.getElementById("botonIniciar");

botonIniciar.addEventListener("click", () => {
  pantallaInicio.style.opacity = "0";
  setTimeout(() => {
    pantallaInicio.style.visibility = "hidden";
    contenidoPrincipal.style.opacity = "1";
    contenidoPrincipal.style.visibility = "visible";
    iniciarTodo();
  }, 800);
});

// ✨ ANIMACIONES PRINCIPALES
function iniciarTodo() {
  // Crear estrellas de galaxia
  const contenedorGalaxia = document.getElementById("estrellasGalaxia");
  for (let i = 0; i < 1200; i++) {
    const estrella = document.createElement("div");
    estrella.classList.add("estrella-fondo");
    const tamaño = Math.random() * 2.5 + 0.3;
    estrella.style.width = tamaño + "px";
    estrella.style.height = tamaño + "px";
    estrella.style.left = Math.random() * 100 + "%";
    estrella.style.top = Math.random() * 100 + "%";
    estrella.style.opacity = Math.random() * 0.9 + 0.1;
    if (tamaño > 1.8) {
      estrella.style.boxShadow = `0 0 ${tamaño*3}px #fff`;
    }
    contenedorGalaxia.appendChild(estrella);
  }

  // Mover fotos
  const fotos = [
    {id: "img1", x: 10, y: 10, vx: 0.25, vy: 0.2},
    {id: "img2", x: 85, y: 15, vx: -0.22, vy: 0.28},
    {id: "img3", x: 15, y: 80, vx: 0.3, vy: -0.25},
    {id: "img4", x: 80, y: 75, vx: -0.24, vy: -0.26},
    {id: "img5", x: 50, y: 50, vx: 0.2, vy: -0.22}
  ];

  function mover() {
    fotos.forEach(f => {
      f.x += f.vx;
      f.y += f.vy;
      if (f.x <= 2 || f.x >= 96) f.vx *= -1;
      if (f.y <= 2 || f.y >= 96) f.vy *= -1;
      document.getElementById(f.id).style.left = f.x + "%";
      document.getElementById(f.id).style.top = f.y + "%";
    });
    requestAnimationFrame(mover);
  }
  mover();

  // Frases románticas
  const textos = [
    "Te amo con todo mi corazón",
    "Eres mi universo",
    "Contigo todo es mejor",
    "Mi vida eres tú",
    "Eres mi sueño hecho realidad",
    "Iluminas mi camino",
    "Para siempre contigo",
    "Lo mejor que me pasó"
  ];

  setInterval(() => {
    const frase = document.createElement("div");
    frase.classList.add("frase");
    frase.textContent = textos[Math.floor(Math.random() * textos.length)];
    frase.style.left = Math.random() * 85 + "%";
    frase.style.bottom = "0px";
    document.body.appendChild(frase);
    setTimeout(() => frase.remove(), 8000);
  }, 3500);
}
</script>

</body>
</html>
