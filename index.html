<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Te Amo Sandra</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ff4d6d,#ff8fab,#ffc2d1);
    color:white;
    text-align:center;
    padding:30px;
}

h1{
    font-size:70px;
    margin-bottom:20px;
    text-shadow:0 0 20px white;
    animation:latido 1.5s infinite;
}

.mensaje{
    font-size:24px;
    max-width:800px;
    margin:0 auto 30px;
}

.galeria{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    margin-top:20px;
}

.galeria img{
    width:250px;
    height:250px;
    object-fit:cover;
    border-radius:20px;
    border:5px solid white;
    box-shadow:0 0 25px rgba(255,255,255,0.8);
    transition:0.3s;
}

.galeria img:hover{
    transform:scale(1.05);
}

.final{
    margin-top:40px;
    font-size:28px;
}

@keyframes latido{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.08);}
}
</style>

</head>
<body>

<h1>💖 TE AMO SANDRA 💖</h1>

<p class="mensaje">
Gracias por todos los momentos compartidos. Eres una persona muy especial para mí ❤️
</p>

<div class="galeria">
    <img src="san1.jpeg" alt="">
    <img src="san 2.jpeg" alt="">
    <img src="san 3.jpeg" alt="">
    <img src="sam 5.jpeg" alt="">
    <img src="san6.jpeg" alt="">
</div>

<p class="final">
🌹 Siempre tendrás un lugar especial en mi corazón 🌹
</p>

</body>
</html>
