<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Universo Sandra</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black; /* fondo negro como pediste */
  font-family: Arial;
}

/* canvas estrellas */
canvas {
  position: absolute;
  top: 0;
  left: 0;
}

/* contenedores laterales */
.side {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.left { left: 20px; }
.right { right: 20px; }

/* fotos MÁS PEQUEÑAS + giro */
.photo {
  width: 90px;
  height: 90px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 0 10px white;
  animation: spin 6s infinite linear;
}

.photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* giro en su propio eje */
@keyframes spin {
  from { transform: rotateY(0deg); }
  to { transform: rotateY(360deg); }
}

/* corazones */
.heart {
  position: absolute;
  color: pink;
  font-size: 18px;
  animation: floatUp 6s linear forwards;
}

@keyframes floatUp {
  from { transform: translateY(100vh); opacity: 1; }
  to { transform: translateY(-20vh); opacity: 0; }
}

/* frases */
.text {
  position: absolute;
  color: white;
  font-size: 14px;
  opacity: 0.8;
  animation: floatUp 10s linear forwards;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<!-- IZQUIERDA -->
<div class="side left">
  <div class="photo"><img src="san 3.jpeg"></div>
  <div class="photo"><img src="san1.jpeg"></div>
  <div class="photo"><img src="san 2.jpeg"></div>
</div>

<!-- DERECHA -->
<div class="side right">
  <div class="photo"><img src="sam 5.jpeg"></div>
  <div class="photo"><img src="san6.jpeg"></div>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

/* ⭐ ESTRELLAS */
let stars = [];
for (let i = 0; i < 700; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5
  });
}

/* dibujar estrellas */
function drawStars() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "white";

  for (let s of stars) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();

    s.y += 0.2;
    if (s.y > canvas.height) s.y = 0;
  }
}

/* 💖 corazones */
function heart() {
  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "❤";
  h.style.left = Math.random()*window.innerWidth + "px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(), 6000);
}
setInterval(heart, 300);

/* ✨ frases bonitas */
const frases = [
  "TE AMO SANDRA 💖",
  "Eres mi universo ✨",
  "Mi corazón es tuyo ❤️",
  "Siempre tú, siempre yo 💕"
];

function textFloat() {
  const t = document.createElement("div");
  t.className = "text";
  t.innerText = frases[Math.floor(Math.random()*frases.length)];
  t.style.left = Math.random()*window.innerWidth + "px";
  t.style.bottom = "0px";
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 10000);
}
setInterval(textFloat, 2000);

/* loop */
function animate() {
  drawStars();
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
