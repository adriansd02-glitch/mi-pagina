<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti ❤️</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-color: #000000;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  position: relative;
  font-family: Arial, sans-serif;
}

/* Estrellas de fondo */
.estrellas {
  position: absolute;
  width: 100%;
  height: 100%;
}

/* Texto principal */
.texto-centro {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 20;
}

.te-amo {
  font-size: 48px;
  font-weight: bold;
  color: #ff2244;
  text-shadow: 0 0 15px #ff2244, 0 0 30px #ff6688;
  margin-bottom: 10px;
}

.sandra {
  font-size: 56px;
  font-weight: bold;
  color: #ff2244;
  text-shadow: 0 0 15px #ff2244, 0 0 30px #ff6688;
}

/* Fotos */
.foto {
  position: absolute;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 0 10px #ff3355, 0 0 20px rgba(255,255,255,0.4);
  z-index: 10;
}

.foto img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Frases pequeñas */
.frase {
  position: absolute;
  color: #ffffff;
  font-size: 12px;
  text-shadow: 0 0 5px #ff2244;
  animation: subir 8s linear forwards;
  z-index: 5;
}

@keyframes subir {
  0% { bottom: -50px; opacity: 0; }
  20% { opacity: 0.8; }
  80% { opacity: 0.8; }
  100% { bottom: 120vh; opacity: 0; }
}
</style>
</head>
<body>

<!-- Fondo de estrellas -->
<div class="estrellas" id="fondo"></div>

<!-- Texto -->
<div class="texto-centro">
  <div class="te-amo">TE AMO</div>
  <div class="sandra">SANDRA</div>
</div>

<!-- Fotos -->
<div class="foto" id="img1"><img src="san 3.jpeg" alt=""></div>
<div class="foto" id="img2"><img src="san1.jpeg" alt=""></div>
<div class="foto" id="img3"><img src="san 2.jpeg" alt=""></div>
<div class="foto" id="img4"><img src="sam 5.jpeg" alt=""></div>
<div class="foto" id="img5"><img src="san6.jpeg" alt=""></div>

<script>
// Crear estrellas
const fondo = document.getElementById("fondo");
for (let i = 0; i < 800; i++) {
  const estrella = document.createElement("div");
  estrella.style.position = "absolute";
  const tamaño = Math.random() * 2 + 0.5;
  estrella.style.width = tamaño + "px";
  estrella.style.height = tamaño + "px";
  estrella.style.background = "#ffffff";
  estrella.style.borderRadius = "50%";
  estrella.style.left = Math.random() * 100 + "%";
  estrella.style.top = Math.random() * 100 + "%";
  estrella.style.opacity = Math.random();
  fondo.appendChild(estrella);
}

// Mover fotos por toda la pantalla
const fotos = [
  {id: "img1", x: 10, y: 10, vx: 0.25, vy: 0.2},
  {id: "img2", x: 85, y: 15, vx: -0.22, vy: 0.28},
  {id: "img3", x: 15, y: 80, vx: 0.3, vy: -0.25},
  {id: "img4", x: 80, y: 75, vx: -0.24, vy: -0.26},
  {id: "img5", x: 50, y: 50, vx: 0.2, vy: -0.22}
];

function mover() {
  fotos.forEach(f => {
    f.x += f.vx;
    f.y += f.vy;
    if (f.x <= 2 || f.x >= 96) f.vx *= -1;
    if (f.y <= 2 || f.y >= 96) f.vy *= -1;
    document.getElementById(f.id).style.left = f.x + "%";
    document.getElementById(f.id).style.top = f.y + "%";
  });
  requestAnimationFrame(mover);
}
mover();

// Frases pequeñas
const textos = [
  "Te amo con todo mi corazón",
  "Eres mi persona favorita",
  "Iluminas mi mundo",
  "Siempre en mi mente",
  "Mi felicidad eres tú",
  "Amor de mi vida",
  "Contigo todo es mejor",
  "Eres mi sueño hecho realidad"
];

setInterval(() => {
  const frase = document.createElement("div");
  frase.className = "frase";
  frase.textContent = textos[Math.floor(Math.random() * textos.length)];
  frase.style.left = Math.random() * 85 + "%";
  frase.style.bottom = "0px";
  document.body.appendChild(frase);
  setTimeout(() => frase.remove(), 8000);
}, 3500);
</script>

</body>
</html>
