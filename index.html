<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia TE AMO</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}

.galaxy {
  position: absolute;
  width: 100%;
  height: 100%;
  perspective: 1200px;
}

.photo {
  position: absolute;
  width: 120px;
  height: 120px;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 0 20px white;
}

.photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="galaxy">

  <div class="photo" style="left:50%; top:50%; transform: translate(-50%,-50%) rotateY(0deg) translateZ(300px);">
    <img src="san 3.jpeg">
  </div>

  <div class="photo" style="left:50%; top:50%; transform: translate(-50%,-50%) rotateY(72deg) translateZ(300px);">
    <img src="sam 5.jpeg">
  </div>

  <div class="photo" style="left:50%; top:50%; transform: translate(-50%,-50%) rotateY(144deg) translateZ(300px);">
    <img src="san1.jpeg">
  </div>

  <div class="photo" style="left:50%; top:50%; transform: translate(-50%,-50%) rotateY(216deg) translateZ(300px);">
    <img src="san 2.jpeg">
  </div>

  <div class="photo" style="left:50%; top:50%; transform: translate(-50%,-50%) rotateY(288deg) translateZ(300px);">
    <img src="san6.jpeg">
  </div>

</div>

<script>
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

// crear estrellas
for (let i = 0; i < 400; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2
  });
}

// texto invisible base
function drawTextMask() {
  const off = document.createElement("canvas");
  const octx = off.getContext("2d");

  off.width = canvas.width;
  off.height = canvas.height;

  octx.fillStyle = "white";
  octx.font = "bold 80px Arial";
  octx.textAlign = "center";
  octx.fillText("TE AMO SANDRA", canvas.width/2, canvas.height/2);

  return octx.getImageData(0,0,off.width,off.height).data;
}

const mask = drawTextMask();

function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for (let i = 0; i < stars.length; i++) {
    let s = stars[i];

    let index = (Math.floor(s.y) * canvas.width + Math.floor(s.x)) * 4;

    let inText = mask[index] > 200;

    ctx.beginPath();
    ctx.fillStyle = inText ? "white" : "rgba(255,255,255,0.2)";
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();

    s.y -= inText ? 0.3 : 0.1;

    if (s.y < 0) s.y = canvas.height;
  }

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
