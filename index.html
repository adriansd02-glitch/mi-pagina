<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Te Amo Sandra</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(45deg,#ff4d6d,#ff85a1,#ffc2d1);
    overflow:hidden;
}

h1{
    font-family:Arial, sans-serif;
    font-size:90px;
    text-align:center;
    color:white;
    text-shadow:
        0 0 10px #fff,
        0 0 20px #ff4d6d,
        0 0 40px #ff4d6d;
    animation: latido 1.5s infinite;
}

.corazon{
    position:absolute;
    color:white;
    font-size:30px;
    animation: flotar 6s linear infinite;
}

@keyframes latido{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.1);}
}

@keyframes flotar{
    0%{
        transform:translateY(100vh);
        opacity:1;
    }
    100%{
        transform:translateY(-100px);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="corazon" style="left:10%;">❤</div>
<div class="corazon" style="left:25%;animation-delay:1s;">❤</div>
<div class="corazon" style="left:40%;animation-delay:2s;">❤</div>
<div class="corazon" style="left:60%;animation-delay:3s;">❤</div>
<div class="corazon" style="left:80%;animation-delay:4s;">❤</div>

<h1>❤ TE AMO SANDRA ❤</h1>

</body>
</html>
