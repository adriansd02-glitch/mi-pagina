<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Universo Sandra</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  margin: 0;
  overflow: hidden;
  background: #000000;
  font-family: Arial, sans-serif;
}
canvas {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
}
/* Estilo de cada foto en órbita */
.foto {
  position: absolute;
  width: 45px;
  height: 45px;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 0 10px rgba(255, 50, 80, 0.7), 0 0 20px rgba(255, 255, 255, 0.3);
  z-index: 10;
  transform-origin: center center;
}
.foto img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
/* Órbitas con diferentes radios y velocidades */
.orbita1 { animation: orbitar 25s linear infinite; }
.orbita2 { animation: orbitar 32s linear infinite; }
.orbita3 { animation: orbitar 38s linear infinite; }
.orbita4 { animation: orbitar 42s linear infinite; }
.orbita5 { animation: orbitar 48s linear infinite; }
@keyframes orbitar {
  from { transform: rotate(0deg) translateX(160px) rotate(0deg); }
  to   { transform: rotate(360deg) translateX(160px) rotate(-360deg); }
}
.orbita2 { animation: orbitar2 32s linear infinite; }
@keyframes orbitar2 {
  from { transform: rotate(0deg) translateX(210px) rotate(0deg); }
  to   { transform: rotate(360deg) translateX(210px) rotate(-360deg); }
}
.orbita3 { animation: orbitar3 38s linear infinite; }
@keyframes orbitar3 {
  from { transform: rotate(0deg) translateX(260px) rotate(0deg); }
  to   { transform: rotate(360deg) translateX(260px) rotate(-360deg); }
}
.orbita4 { animation: orbitar4 42s linear infinite; }
@keyframes orbitar4 {
  from { transform: rotate(45deg) translateX(180px) rotate(-45deg); }
  to   { transform: rotate(405deg) translateX(180px) rotate(-405deg); }
}
.orbita5 { animation: orbitar5 48s linear infinite; }
@keyframes orbitar5 {
  from { transform: rotate(90deg) translateX(230px) rotate(-90deg); }
  to   { transform: rotate(450deg) translateX(230px) rotate(-450deg); }
}
.heart {
  position: absolute;
  color: #ff6688;
  font-size: 18px;
  z-index: 5;
  animation: flotar 7s linear forwards;
}
@keyframes flotar {
  from { transform: translateY(100vh) scale(0.7); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  to   { transform: translateY(-20vh) scale(1.2); opacity: 0; }
}
.frase {
  position: absolute;
  color: #ffffff;
  font-size: 14px;
  font-weight: bold;
  text-shadow: 0 0 8px #ff2244, 0 0 15px #ff2244;
  z-index: 8;
  animation: subir 11s linear forwards;
}
@keyframes subir {
  from { transform: translateY(100vh); opacity: 0; }
  15%  { opacity: 1; }
  85%  { opacity: 1; }
  to   { transform: translateY(-25vh); opacity: 0; }
}
</style>
</head>
<body>

<canvas id="lienzo"></canvas>

<!-- Fotos girando en órbita -->
<div class="foto orbita1"><img src="san 3.jpeg" alt="Foto 3"></div>
<div class="foto orbita2"><img src="san1.jpeg" alt="Foto 1"></div>
<div class="foto orbita3"><img src="san 2.jpeg" alt="Foto 2"></div>
<div class="foto orbita4"><img src="sam 5.jpeg" alt="Foto 5"></div>
<div class="foto orbita5"><img src="san6.jpeg" alt="Foto 6"></div>

<script>
const lienzo = document.getElementById("lienzo");
const ctx = lienzo.getContext("2d");
let ancho = window.innerWidth;
let alto = window.innerHeight;

function ajustarLienzo() {
  ancho = window.innerWidth;
  alto = window.innerHeight;
  lienzo.width = ancho;
  lienzo.height = alto;
  crearTextoEstrellas();
}
ajustarLienzo();
window.addEventListener("resize", ajustarLienzo);

// Estrellas de fondo
let estrellasFondo = [];
for (let i = 0; i < 800; i++) {
  estrellasFondo.push({
    x: Math.random() * ancho,
    y: Math.random() * alto,
    tam: Math.random() * 1.2,
    velocidad: Math.random() * 0.15 + 0.05
  });
}

// Texto "TE AMO / SANDRA" formado por estrellas rojas
let estrellasTexto = [];
function crearTextoEstrellas() {
  estrellasTexto = [];
  const tamLetra = 75;
  const separacion = tamLetra * 1.3;
  const centroX = ancho / 2;
  const centroY = alto / 2;

  // Línea 1: TE AMO
  const lienzoTemp1 = document.createElement("canvas");
  const ctxTemp1 = lienzoTemp1.getContext("2d");
  lienzoTemp1.width = tamLetra * 3.4;
  lienzoTemp1.height = tamLetra;
  ctxTemp1.fillStyle = "#fff";
  ctxTemp1.font = "bold " + tamLetra + "px Arial, sans-serif";
  ctxTemp1.textAlign = "center";
  ctxTemp1.textBaseline = "middle";
  ctxTemp1.fillText("TE AMO", lienzoTemp1.width / 2, lienzoTemp1.height / 2);
  const datos1 = ctxTemp1.getImageData(0, 0, lienzoTemp1.width, lienzoTemp1.height).data;

  for (let y = 0; y < lienzoTemp1.height; y += 2) {
    for (let x = 0; x < lienzoTemp1.width; x += 2) {
      const pos = (y * lienzoTemp1.width + x) * 4;
      if (datos1[pos + 3] > 140) {
        estrellasTexto.push({
          x: centroX - (lienzoTemp1.width / 2) + x,
          y: centroY - separacion / 2 + y,
          tam: 0.65
        });
      }
    }
  }

  // Línea 2: SANDRA
  const lienzoTemp2 = document.createElement("canvas");
  const ctxTemp2 = lienzoTemp2.getContext("2d");
  lienzoTemp2.width = tamLetra * 4;
  lienzoTemp2.height = tamLetra;
  ctxTemp2.fillStyle = "#fff";
  ctxTemp2.font = "bold " + tamLetra + "px Arial, sans-serif";
  ctxTemp2.textAlign = "center";
  ctxTemp2.textBaseline = "middle";
  ctxTemp2.fillText("SANDRA", lienzoTemp2.width / 2, lienzoTemp2.height / 2);
  const datos2 = ctxTemp2.getImageData(0, 0, lienzoTemp2.width, lienzoTemp2.height).data;

  for (let y = 0; y < lienzoTemp2.height; y += 2) {
    for (let x = 0; x < lienzoTemp2.width; x += 2) {
      const pos = (y * lienzoTemp2.width + x) * 4;
      if (datos2[pos + 3] > 140) {
        estrellasTexto.push({
          x: centroX - (lienzoTemp2.width / 2) + x,
          y: centroY + separacion / 2 + y,
          tam: 0.65
        });
      }
    }
  }
}
crearTextoEstrellas();

// Animación principal
function animar() {
  ctx.clearRect(0, 0, ancho, alto);

  // Estrellas de fondo
  ctx.fillStyle = "#ffffff";
  for (let e of estrellasFondo) {
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.tam, 0, Math.PI * 2);
    ctx.fill();
    e.y += e.velocidad;
    if (e.y > alto) e.y = 0;
  }

  // Texto en estrellas rojas
  ctx.fillStyle = "#ff2244";
  for (let et of estrellasTexto) {
    ctx.beginPath();
    ctx.arc(et.x, et.y, et.tam, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(animar);
}
animar();

// Corazones flotando
setInterval(() => {
  const corazon = document.createElement("div");
  corazon.className = "heart";
  corazon.textContent = "❤";
  corazon.style.left = Math.random() * ancho + "px";
  document.body.appendChild(corazon);
  setTimeout(() => corazon.remove(), 7000);
}, 500);

// Frases románticas
const frases = [
  "TE AMO SANDRA 💖",
  "Eres mi universo ✨",
  "Mi corazón es tuyo ❤️",
  "Amor de mi vida 💕",
  "Siempre contigo ⭐",
  "Iluminas mi camino 💞"
];
setInterval(() => {
  const texto = document.createElement("div");
  texto.className = "frase";
  texto.textContent = frases[Math.floor(Math.random() * frases.length)];
  texto.style.left = Math.random() * (ancho - 160) + "px";
  document.body.appendChild(texto);
  setTimeout(() => texto.remove(), 11000);
}, 3000);
</script>

</body>
</html>
