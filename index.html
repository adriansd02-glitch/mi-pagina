<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti ❤️</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-color: #000000;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  position: relative;
  font-family: Arial, sans-serif;
}

/* ======================================
   🎬 PANTALLA DE INICIO / PORTADA
====================================== */
.pantalla-inicio {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, #12001a 0%, #000000 75%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  transition: opacity 0.8s ease;
  overflow: hidden;
}

/* Estrellas en la portada */
.estrellas-portada {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
}

.estrella {
  position: absolute;
  border-radius: 50%;
  background: #ffffff;
  animation: parpadeo 3s ease-in-out infinite;
}

@keyframes parpadeo {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 1; }
}

/* Corazones flotando en la portada */
.corazon-deco {
  position: absolute;
  color: #ff4466;
  font-size: 20px;
  animation: flotar 12s linear infinite;
  opacity: 0.6;
}

@keyframes flotar {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.7; }
  90% { opacity: 0.7; }
  100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
}

/* Texto de portada */
.pantalla-inicio h1 {
  color: #ff2244;
  font-size: 46px;
  text-shadow: 0 0 15px #ff2244, 0 0 30px #ff6688, 0 0 45px #ff99aa;
  margin-bottom: 25px;
  animation: brillarTexto 4s ease-in-out infinite alternate;
  z-index: 10;
}

.pantalla-inicio p {
  color: #ffdde6;
  font-size: 20px;
  margin-bottom: 50px;
  text-shadow: 0 0 8px #ff4466;
  z-index: 10;
}

@keyframes brillarTexto {
  from { filter: brightness(1); }
  to { filter: brightness(1.5); }
}

/* Botón de iniciar decorado */
.boton-iniciar {
  padding: 18px 45px;
  font-size: 24px;
  font-weight: bold;
  color: #ffffff;
  background: linear-gradient(45deg, #ff2244, #ff6699);
  border: none;
  border-radius: 60px;
  box-shadow: 0 0 20px #ff2244, 0 0 40px rgba(255, 34, 68, 0.6), inset 0 0 10px rgba(255,255,255,0.3);
  cursor: pointer;
  transition: all 0.3s ease;
  z-index: 10;
  position: relative;
  overflow: hidden;
}

.boton-iniciar::before {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
  animation: brilloBoton 5s linear infinite;
}

@keyframes brilloBoton {
  0% { transform: translate(-100%, -100%) rotate(0deg); }
  100% { transform: translate(100%, 100%) rotate(360deg); }
}

.boton-iniciar:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px #ff2244, 0 0 50px rgba(255, 34, 68, 0.8);
}

/* ======================================
   ✨ CONTENIDO PRINCIPAL
====================================== */
.contenido-principal {
  width: 100%;
  height: 100%;
  position: relative;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.8s ease;
}

.estrellas {
  position: absolute;
  width: 100%;
  height: 100%;
}

.texto-centro {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 20;
}

.te-amo {
  font-size: 48px;
  font-weight: bold;
  color: #ff2244;
  text-shadow: 0 0 15px #ff2244, 0 0 30px #ff6688;
  margin-bottom: 10px;
}

.sandra {
  font-size: 56px;
  font-weight: bold;
  color: #ff2244;
  text-shadow: 0 0 15px #ff2244, 0 0 30px #ff6688;
}

/* Fotos */
.foto {
  position: absolute;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 0 10px #ff3355, 0 0 20px rgba(255,255,255,0.4);
  z-index: 10;
}

.foto img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Frases pequeñas */
.frase {
  position: absolute;
  color: #ffffff;
  font-size: 12px;
  text-shadow: 0 0 5px #ff2244;
  animation: subir 8s linear forwards;
  z-index: 5;
}

@keyframes subir {
  0% { bottom: -50px; opacity: 0; }
  20% { opacity: 0.8; }
  80% { opacity: 0.8; }
  100% { bottom: 120vh; opacity: 0; }
}
</style>
</head>
<body>

<!-- 🎬 PANTALLA DE INICIO DECORADA -->
<div class="pantalla-inicio" id="pantallaInicio">
  <div class="estrellas-portada" id="estrellasPortada"></div>

  <h1>Para ti ❤️</h1>
  <p>Un detalle con mucho amor</p>
  <button class="boton-iniciar" id="botonIniciar">INICIAR</button>
</div>

<!-- ✨ PANTALLA PRINCIPAL -->
<div class="contenido-principal" id="contenidoPrincipal">
  <div class="estrellas" id="fondo"></div>

  <div class="texto-centro">
    <div class="te-amo">TE AMO</div>
    <div class="sandra">SANDRA</div>
  </div>

  <div class="foto" id="img1"><img src="san 3.jpeg" alt=""></div>
  <div class="foto" id="img2"><img src="san1.jpeg" alt=""></div>
  <div class="foto" id="img3"><img src="san 2.jpeg" alt=""></div>
  <div class="foto" id="img4"><img src="sam 5.jpeg" alt=""></div>
  <div class="foto" id="img5"><img src="san6.jpeg" alt=""></div>
</div>

<script>
// 🎨 DECORACIÓN DE LA PORTADA
// Crear estrellas en portada
const contenedorEstrellas = document.getElementById("estrellasPortada");
for (let i = 0; i < 500; i++) {
  const estrella = document.createElement("div");
  estrella.classList.add("estrella");
  const tamaño = Math.random() * 2 + 0.5;
  estrella.style.width = tamaño + "px";
  estrella.style.height = tamaño + "px";
  estrella.style.left = Math.random() * 100 + "%";
  estrella.style.top = Math.random() * 100 + "%";
  estrella.style.animationDelay = Math.random() * 3 + "s";
  contenedorEstrellas.appendChild(estrella);
}

// Crear corazones flotantes en portada
setInterval(() => {
  const corazon = document.createElement("div");
  corazon.classList.add("corazon-deco");
  corazon.textContent = "❤️";
  corazon.style.left = Math.random() * 100 + "%";
  corazon.style.fontSize = (Math.random() * 15 + 15) + "px";
  corazon.style.animationDuration = (Math.random() * 5 + 8) + "s";
  document.getElementById("pantallaInicio").appendChild(corazon);
  setTimeout(() => corazon.remove(), 12000);
}, 800);

// 🎯 CAMBIO DE PANTALLA
const pantallaInicio = document.getElementById("pantallaInicio");
const contenidoPrincipal = document.getElementById("contenidoPrincipal");
const botonIniciar = document.getElementById("botonIniciar");

botonIniciar.addEventListener("click", () => {
  pantallaInicio.style.opacity = "0";
  setTimeout(() => {
    pantallaInicio.style.visibility = "hidden";
    contenidoPrincipal.style.opacity = "1";
    contenidoPrincipal.style.visibility = "visible";
    iniciarAnimaciones();
  }, 800);
});

// ✨ ANIMACIONES DE LA PANTALLA PRINCIPAL
function iniciarAnimaciones() {
  // Estrellas del fondo
  const fondo = document.getElementById("fondo");
  for (let i = 0; i < 800; i++) {
    const estrella = document.createElement("div");
    estrella.style.position = "absolute";
    const tamaño = Math.random() * 2 + 0.5;
    estrella.style.width = tamaño + "px";
    estrella.style.height = tamaño + "px";
    estrella.style.background = "#ffffff";
    estrella.style.borderRadius = "50%";
    estrella.style.left = Math.random() * 100 + "%";
    estrella.style.top = Math.random() * 100 + "%";
    estrella.style.opacity = Math.random();
    fondo.appendChild(estrella);
  }

  // Mover fotos
  const fotos = [
    {id: "img1", x: 10, y: 10, vx: 0.25, vy: 0.2},
    {id: "img2", x: 85, y: 15, vx: -0.22, vy: 0.28},
    {id: "img3", x: 15, y: 80, vx: 0.3, vy: -0.25},
    {id: "img4", x: 80, y: 75, vx: -0.24, vy: -0.26},
    {id: "img5", x: 50, y: 50, vx: 0.2, vy: -0.22}
  ];

  function mover() {
    fotos.forEach(f => {
      f.x += f.vx;
      f.y += f.vy;
      if (f.x <= 2 || f.x >= 96) f.vx *= -1;
      if (f.y <= 2 || f.y >= 96) f.vy *= -1;
      document.getElementById(f.id).style.left = f.x + "%";
      document.getElementById(f.id).style.top = f.y + "%";
    });
    requestAnimationFrame(mover);
  }
  mover();

  // Frases románticas
  const textos = [
    "Te amo con todo mi corazón",
    "Eres mi persona favorita",
    "Iluminas mi mundo",
    "Siempre en mi mente",
    "Mi felicidad eres tú",
    "Amor de mi vida",
    "Contigo todo es mejor",
    "Eres mi sueño hecho realidad"
  ];

  setInterval(() => {
    const frase = document.createElement("div");
    frase.classList.add("frase");
    frase.textContent = textos[Math.floor(Math.random() * textos.length)];
    frase.style.left = Math.random() * 85 + "%";
    frase.style.bottom = "0px";
    document.body.appendChild(frase);
    setTimeout(() => frase.remove(), 8000);
  }, 3500);
}
</script>

</body>
</html>
