<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Página</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

h1{
    font-family:Arial, sans-serif;
    font-size:90px;
    text-transform:uppercase;
    animation: colores 3s infinite;
    text-shadow:0 0 20px currentColor;
}

@keyframes colores{
    0%{color:#00ffff;}
    25%{color:#00ff00;}
    50%{color:#ffff00;}
    75%{color:#ff00ff;}
    100%{color:#00ffff;}
}
</style>
</head>

<body>
    <h1>ADRIAN</h1>
</body>
</html>
