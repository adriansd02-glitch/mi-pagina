<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Universo Sandra</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #000000;
  font-family: Arial, sans-serif;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
}

/* Contenedor de fotos FIJO */
.side {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 10;
}

.left { left: 3%; }
.right { right: 3%; }

/* Fotos más pequeñas */
.photo {
  width: 55px;
  height: 55px;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
  animation: spin 7s infinite linear;
  perspective: 1000px;
}

.photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

@keyframes spin {
  from { transform: rotateY(0deg); }
  to { transform: rotateY(360deg); }
}

.heart {
  position: absolute;
  color: #ff99cc;
  font-size: 16px;
  z-index: 5;
  animation: floatUp 6s linear forwards;
}

@keyframes floatUp {
  from { transform: translateY(100vh) scale(0.8); opacity: 1; }
  to { transform: translateY(-20vh) scale(1.1); opacity: 0; }
}

.text {
  position: absolute;
  color: #ffffff;
  font-size: 13px;
  font-weight: 500;
  opacity: 0.9;
  z-index: 5;
  animation: floatUp 10s linear forwards;
  text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<!-- IZQUIERDA -->
<div class="side left">
  <div class="photo"><img src="san 3.jpeg" alt="Foto 3"></div>
  <div class="photo"><img src="san1.jpeg" alt="Foto 1"></div>
  <div class="photo"><img src="san 2.jpeg" alt="Foto 2"></div>
</div>

<!-- DERECHA -->
<div class="side right">
  <div class="photo"><img src="sam 5.jpeg" alt="Foto 5"></div>
  <div class="photo"><img src="san6.jpeg" alt="Foto 6"></div>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

/* ⭐ ESTRELLAS DE FONDO */
let stars = [];
for (let i = 0; i < 600; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1
  });
}

/* ✨ TEXTO "TE AMO SANDRA" - AHORA MÁS COMPACTO Y CENTRADO */
let textStars = [];
function createTextStars() {
  textStars = [];
  const tempCanvas = document.createElement("canvas");
  const tempCtx = tempCanvas.getContext("2d");
  const size = 55; // Tamaño más reducido para que entre en cualquier celular
  tempCanvas.width = size * 5.5; // Ancho justo para que no sobre ni falte
  tempCanvas.height = size;

  tempCtx.fillStyle = "white";
  tempCtx.font = "bold " + size + "px Arial";
  tempCtx.textAlign = "center";
  tempCtx.textBaseline = "middle";
  tempCtx.fillText("TE AMO SANDRA", tempCanvas.width / 2, tempCanvas.height / 2);

  const imgData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
  const data = imgData.data;
  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;

  // Espaciado más cerrado para que se vea completo
  for (let y = 0; y < tempCanvas.height; y += 2.5) {
    for (let x = 0; x < tempCanvas.width; x += 2.5) {
      const idx = (y * tempCanvas.width + x) * 4;
      if (data[idx + 3] > 128) {
        textStars.push({
          x: centerX - (tempCanvas.width / 2) + x,
          y: centerY - (tempCanvas.height / 2) + y,
          r: Math.random() * 0.5 + 0.2
        });
      }
    }
  }
}
createTextStars();
window.addEventListener("resize", createTextStars);

/* DIBUJAR TODO */
function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Fondo de estrellas blancas
  ctx.fillStyle = "white";
  for (let s of stars) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
    s.y += 0.2;
    if (s.y > canvas.height) s.y = 0;
  }

  // Texto en estrellas ROJAS
  ctx.fillStyle = "#ff2244";
  for (let ts of textStars) {
    ctx.beginPath();
    ctx.arc(ts.x, ts.y, ts.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* 💖 CORAZONES */
function heart() {
  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "❤";
  h.style.left = Math.random() * window.innerWidth + "px";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 6000);
}
setInterval(heart, 400);

/* ✨ FRASES */
const frases = [
  "TE AMO SANDRA 💖",
  "Eres mi universo ✨",
  "Mi corazón es tuyo ❤️",
  "Siempre contigo 💕",
  "Iluminas mi vida ⭐",
  "Lo mejor que me pasó 💞"
];

function textFloat() {
  const t = document.createElement("div");
  t.className = "text";
  t.innerText = frases[Math.floor(Math.random() * frases.length)];
  t.style.left = Math.random() * (window.innerWidth - 140) + "px";
  t.style.bottom = "0px";
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 10000);
}
setInterval(textFloat, 2500);

function animate() {
  drawStars();
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
