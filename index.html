<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Sandra ❤️</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  position: relative;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
  width: 100%;
  height: 100%;
}

/* Fotos en órbita */
.foto {
  position: absolute;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 0 8px #ff3355, 0 0 15px rgba(255,255,255,0.4);
  z-index: 10;
  transform-origin: center center;
}
.foto img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Órbitas separadas */
.o1 { animation: giro1 26s linear infinite; }
.o2 { animation: giro2 32s linear infinite; }
.o3 { animation: giro3 38s linear infinite; }
.o4 { animation: giro4 44s linear infinite; }
.o5 { animation: giro5 50s linear infinite; }

@keyframes giro1 {
  0% { transform: rotate(0deg) translateX(150px) rotate(0deg); }
  100% { transform: rotate(360deg) translateX(150px) rotate(-360deg); }
}
@keyframes giro2 {
  0% { transform: rotate(70deg) translateX(200px) rotate(-70deg); }
  100% { transform: rotate(430deg) translateX(200px) rotate(-430deg); }
}
@keyframes giro3 {
  0% { transform: rotate(140deg) translateX(250px) rotate(-140deg); }
  100% { transform: rotate(500deg) translateX(250px) rotate(-500deg); }
}
@keyframes giro4 {
  0% { transform: rotate(210deg) translateX(170px) rotate(-210deg); }
  100% { transform: rotate(570deg) translateX(170px) rotate(-570deg); }
}
@keyframes giro5 {
  0% { transform: rotate(280deg) translateX(220px) rotate(-280deg); }
  100% { transform: rotate(640deg) translateX(220px) rotate(-640deg); }
}

/* Corazones flotando */
.corazon {
  position: absolute;
  color: #ff6699;
  font-size: 18px;
  z-index: 5;
  animation: subir 7s linear forwards;
}
@keyframes subir {
  0% { transform: translateY(100vh); opacity: 0; }
  20% { opacity: 1; }
  80% { opacity: 1; }
  100% { transform: translateY(-20vh); opacity: 0; }
}
</style>
</head>
<body>

<canvas id="lienzo"></canvas>

<!-- Tus fotos -->
<div class="foto o1"><img src="san 3.jpeg" alt="Foto"></div>
<div class="foto o2"><img src="san1.jpeg" alt="Foto"></div>
<div class="foto o3"><img src="san 2.jpeg" alt="Foto"></div>
<div class="foto o4"><img src="sam 5.jpeg" alt="Foto"></div>
<div class="foto o5"><img src="san6.jpeg" alt="Foto"></div>

<script>
const lienzo = document.getElementById("lienzo");
const ctx = lienzo.getContext("2d");

function ajustar() {
  lienzo.width = window.innerWidth;
  lienzo.height = window.innerHeight;
}
ajustar();
window.addEventListener("resize", ajustar);

// 👉 Estrellas de fondo (ahora sí se ven)
let estrellas = [];
for (let i = 0; i < 900; i++) {
  estrellas.push({
    x: Math.random() * lienzo.width,
    y: Math.random() * lienzo.height,
    tam: Math.random() * 1.1,
    vel: Math.random() * 0.12 + 0.03
  });
}

// 👉 Texto TE AMO / SANDRA en estrellas rojas
let textoEstrellas = [];
function crearTexto() {
  textoEstrellas = [];
  const tam = 65;
  const centroX = lienzo.width / 2;
  const centroY = lienzo.height / 2;

  // Línea 1: TE AMO
  const t1 = document.createElement("canvas");
  const c1 = t1.getContext("2d");
  t1.width = tam * 3.3;
  t1.height = tam;
  c1.fillStyle = "#fff";
  c1.font = `bold ${tam}px Arial`;
  c1.textAlign = "center";
  c1.textBaseline = "middle";
  c1.fillText("TE AMO", t1.width/2, t1.height/2);
  const d1 = c1.getImageData(0,0,t1.width,t1.height).data;

  for (let y=0; y<t1.height; y+=2) {
    for (let x=0; x<t1.width; x+=2) {
      const pos = (y * t1.width + x) * 4;
      if (d1[pos+3] > 120) {
        textoEstrellas.push({
          x: centroX - t1.width/2 + x,
          y: centroY - tam*0.8 + y,
          tam: 0.7
        });
      }
    }
  }

  // Línea 2: SANDRA
  const t2 = document.createElement("canvas");
  const c2 = t2.getContext("2d");
  t2.width = tam * 3.9;
  t2.height = tam;
  c2.fillStyle = "#fff";
  c2.font = `bold ${tam}px Arial`;
  c2.textAlign = "center";
  c2.textBaseline = "middle";
  c2.fillText("SANDRA", t2.width/2, t2.height/2);
  const d2 = c2.getImageData(0,0,t2.width,t2.height).data;

  for (let y=0; y<t2.height; y+=2) {
    for (let x=0; x<t2.width; x+=2) {
      const pos = (y * t2.width + x) * 4;
      if (d2[pos+3] > 120) {
        textoEstrellas.push({
          x: centroX - t2.width/2 + x,
          y: centroY + tam*0.8 + y,
          tam: 0.7
        });
      }
    }
  }
}
crearTexto();
window.addEventListener("resize", crearTexto);

// 👉 Animación principal
function animar() {
  ctx.clearRect(0,0,lienzo.width,lienzo.height);

  // Dibujar estrellas de fondo
  ctx.fillStyle = "#ffffff";
  for (let e of estrellas) {
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.tam, 0, Math.PI*2);
    ctx.fill();
    e.y += e.vel;
    if (e.y > lienzo.height) e.y = 0;
  }

  // Dibujar texto rojo
  ctx.fillStyle = "#ff2233";
  for (let et of textoEstrellas) {
    ctx.beginPath();
    ctx.arc(et.x, et.y, et.tam, 0, Math.PI*2);
    ctx.fill();
  }

  requestAnimationFrame(animar);
}
animar();

// Corazones que suben
setInterval(() => {
  const c = document.createElement("div");
  c.className = "corazon";
  c.textContent = "❤";
  c.style.left = Math.random() * 100 + "%";
  document.body.appendChild(c);
  setTimeout(() => c.remove(), 7000);
}, 600);
</script>

</body>
</html>
