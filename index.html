<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Universo Sandra</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #000000;
  font-family: Arial, sans-serif;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
}

/* Cada foto tiene su propia animación independiente */
.photo {
  position: absolute;
  width: 42px;
  height: 42px;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
  animation: girar 6s infinite linear;
  perspective: 1000px;
  z-index: 10;
}

.photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Animación de giro */
@keyframes girar {
  from { transform: rotateY(0deg); }
  to { transform: rotateY(360deg); }
}

/* Movimientos diferentes para cada foto */
.f1 { animation: mover1 25s linear infinite; }
.f2 { animation: mover2 29s linear infinite; }
.f3 { animation: mover3 32s linear infinite; }
.f4 { animation: mover4 27s linear infinite; }
.f5 { animation: mover5 30s linear infinite; }

/* Rutas distintas, nunca se salen de la pantalla */
@keyframes mover1 {
  0%   { top: 10%; left: 10%; }
  25%  { top: 20%; left: 80%; }
  50%  { top: 75%; left: 70%; }
  75%  { top: 65%; left: 15%; }
  100% { top: 10%; left: 10%; }
}

@keyframes mover2 {
  0%   { top: 30%; left: 85%; }
  25%  { top: 80%; left: 75%; }
  50%  { top: 60%; left: 10%; }
  75%  { top: 15%; left: 20%; }
  100% { top: 30%; left: 85%; }
}

@keyframes mover3 {
  0%   { top: 70%; left: 20%; }
  25%  { top: 10%; left: 75%; }
  50%  { top: 25%; left: 15%; }
  75%  { top: 80%; left: 80%; }
  100% { top: 70%; left: 20%; }
}

@keyframes mover4 {
  0%   { top: 50%; left: 85%; }
  25%  { top: 75%; left: 10%; }
  50%  { top: 15%; left: 70%; }
  75%  { top: 85%; left: 60%; }
  100% { top: 50%; left: 85%; }
}

@keyframes mover5 {
  0%   { top: 85%; left: 50%; }
  25%  { top: 15%; left: 25%; }
  50%  { top: 40%; left: 80%; }
  75%  { top: 70%; left: 30%; }
  100% { top: 85%; left: 50%; }
}

.heart {
  position: absolute;
  color: #ff99cc;
  font-size: 16px;
  z-index: 5;
  animation: flotar 6s linear forwards;
}

@keyframes flotar {
  from { transform: translateY(100vh) scale(0.8); opacity: 1; }
  to { transform: translateY(-20vh) scale(1.1); opacity: 0; }
}

.text {
  position: absolute;
  color: #ffffff;
  font-size: 13px;
  font-weight: 500;
  opacity: 0.9;
  z-index: 5;
  animation: flotar 10s linear forwards;
  text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<!-- Cada foto por separado con su propio movimiento -->
<div class="photo f1"><img src="san 3.jpeg" alt="Foto 3"></div>
<div class="photo f2"><img src="san1.jpeg" alt="Foto 1"></div>
<div class="photo f3"><img src="san 2.jpeg" alt="Foto 2"></div>
<div class="photo f4"><img src="sam 5.jpeg" alt="Foto 5"></div>
<div class="photo f5"><img src="san6.jpeg" alt="Foto 6"></div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function ajustarLienzo() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
ajustarLienzo();
window.addEventListener("resize", ajustarLienzo);

/* ⭐ Estrellas de fondo */
let estrellasFondo = [];
for (let i = 0; i < 600; i++) {
  estrellasFondo.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    tam: Math.random() * 1.1
  });
}

/* ✨ TEXTO: TE AMO arriba / SANDRA abajo, formado de estrellas rojas claras */
let estrellasTexto = [];
function crearTextoEstrellas() {
  estrellasTexto = [];
  const tamLetra = 80;
  const separacion = tamLetra * 1.4;
  const centroX = canvas.width / 2;
  const centroY = canvas.height / 2;

  // Línea 1: TE AMO
  const lienzo1 = document.createElement("canvas");
  const ctx1 = lienzo1.getContext("2d");
  lienzo1.width = tamLetra * 3.5;
  lienzo1.height = tamLetra;
  ctx1.fillStyle = "#fff";
  ctx1.font = "bold " + tamLetra + "px Arial";
  ctx1.textAlign = "center";
  ctx1.textBaseline = "middle";
  ctx1.fillText("TE AMO", lienzo1.width / 2, lienzo1.height / 2);
  const datos1 = ctx1.getImageData(0, 0, lienzo1.width, lienzo1.height).data;

  for (let y = 0; y < lienzo1.height; y += 2) {
    for (let x = 0; x < lienzo1.width; x += 2) {
      const pos = (y * lienzo1.width + x) * 4;
      if (datos1[pos + 3] > 150) {
        estrellasTexto.push({
          x: centroX - (lienzo1.width / 2) + x,
          y: centroY - separacion / 2 + y,
          tam: 0.6
        });
      }
    }
  }

  // Línea 2: SANDRA
  const lienzo2 = document.createElement("canvas");
  const ctx2 = lienzo2.getContext("2d");
  lienzo2.width = tamLetra * 4.2;
  lienzo2.height = tamLetra;
  ctx2.fillStyle = "#fff";
  ctx2.font = "bold " + tamLetra + "px Arial";
  ctx2.textAlign = "center";
  ctx2.textBaseline = "middle";
  ctx2.fillText("SANDRA", lienzo2.width / 2, lienzo2.height / 2);
  const datos2 = ctx2.getImageData(0, 0, lienzo2.width, lienzo2.height).data;

  for (let y = 0; y < lienzo2.height; y += 2) {
    for (let x = 0; x < lienzo2.width; x += 2) {
      const pos = (y * lienzo2.width + x) * 4;
      if (datos2[pos + 3] > 150) {
        estrellasTexto.push({
          x: centroX - (lienzo2.width / 2) + x,
          y: centroY + separacion / 2 + y,
          tam: 0.6
        });
      }
    }
  }
}
crearTextoEstrellas();
window.addEventListener("resize", crearTextoEstrellas);

/* 🎨 Animación general */
function animar() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Dibujar estrellas de fondo
  ctx.fillStyle = "#ffffff";
  for (let e of estrellasFondo) {
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.tam, 0, Math.PI * 2);
    ctx.fill();
    e.y += 0.22;
    if (e.y > canvas.height) e.y = 0;
  }

  // Dibujar texto con estrellas rojas
  ctx.fillStyle = "#ff2233";
  for (let et of estrellasTexto) {
    ctx.beginPath();
    ctx.arc(et.x, et.y, et.tam, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(animar);
}
animar();

/* 💖 Corazones flotando */
setInterval(() => {
  const corazon = document.createElement("div");
  corazon.className = "heart";
  corazon.textContent = "❤";
  corazon.style.left = Math.random() * window.innerWidth + "px";
  document.body.appendChild(corazon);
  setTimeout(() => corazon.remove(), 6000);
}, 400);

/* ✨ Frases */
const frases = [
  "TE AMO SANDRA 💖",
  "Eres mi universo ✨",
  "Mi corazón es tuyo ❤️",
  "Siempre contigo 💕",
  "Iluminas mi vida ⭐"
];

setInterval(() => {
  const texto = document.createElement("div");
  texto.className = "text";
  texto.textContent = frases[Math.floor(Math.random() * frases.length)];
  texto.style.left = Math.random() * (window.innerWidth - 150) + "px";
  document.body.appendChild(texto);
  setTimeout(() => texto.remove(), 10000);
}, 2500);

</script>

</body>
</html>
