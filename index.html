<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia Pro</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}

.photo {
  position: absolute;
  width: 110px;
  height: 110px;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 0 20px white;
}

.photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<!-- fotos -->
<div class="photo" style="left:50%; top:50%; transform: translate(-50%,-50%) rotateY(0deg) translateZ(300px);">
  <img src="san 3.jpeg">
</div>

<div class="photo" style="left:50%; top:50%; transform: translate(-50%,-50%) rotateY(72deg) translateZ(300px);">
  <img src="sam 5.jpeg">
</div>

<div class="photo" style="left:50%; top:50%; transform: translate(-50%,-50%) rotateY(144deg) translateZ(300px);">
  <img src="san1.jpeg">
</div>

<div class="photo" style="left:50%; top:50%; transform: translate(-50%,-50%) rotateY(216deg) translateZ(300px);">
  <img src="san 2.jpeg">
</div>

<div class="photo" style="left:50%; top:50%; transform: translate(-50%,-50%) rotateY(288deg) translateZ(300px);">
  <img src="san6.jpeg">
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// puntos del texto
let points = [];
let particles = [];

function createTextPoints() {
  let off = document.createElement("canvas");
  let octx = off.getContext("2d");

  off.width = canvas.width;
  off.height = canvas.height;

  octx.fillStyle = "white";
  octx.font = "bold 90px Arial";
  octx.textAlign = "center";
  octx.fillText("TE AMO SANDRA", canvas.width/2, canvas.height/2);

  let data = octx.getImageData(0,0,off.width,off.height).data;

  for (let y = 0; y < off.height; y += 6) {
    for (let x = 0; x < off.width; x += 6) {
      let i = (y * off.width + x) * 4;
      if (data[i] > 200) {
        points.push({x, y});
      }
    }
  }
}

function createParticles() {
  for (let i = 0; i < 1200; i++) {
    particles.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      tx: 0,
      ty: 0
    });
  }
}

function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "white";

  for (let i = 0; i < particles.length; i++) {
    let p = particles[i];

    let target = points[i % points.length];

    p.tx = target.x;
    p.ty = target.y;

    p.x += (p.tx - p.x) * 0.05;
    p.y += (p.ty - p.y) * 0.05;

    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2);
    ctx.fill();
  }

  requestAnimationFrame(animate);
}

createTextPoints();
createParticles();
animate();
</script>

</body>
</html>
