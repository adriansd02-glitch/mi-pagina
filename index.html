<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<!-- LÍNEA CLAVE PARA QUE SE VEA PERFECTO EN CELULAR -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Para ti ❤️ Sandra</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-font-smoothing: antialiased;
}

body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* ======================================
   🎬 PANTALLA DE INICIO DECORADA
====================================== */
.pantalla-inicio {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, #12001a 0%, #000000 75%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  transition: opacity 0.8s ease;
  overflow: hidden;
}

.estrellas-portada {
  position: absolute;
  width: 100%;
  height: 100%;
  will-change: opacity;
}

.estrella {
  position: absolute;
  border-radius: 50%;
  background: #ffffff;
  animation: parpadeo 3s ease-in-out infinite;
  will-change: opacity;
}

@keyframes parpadeo {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 1; }
}

.corazon-deco {
  position: absolute;
  color: #ff4466;
  font-size: clamp(16px, 4vw, 20px);
  animation: flotar 12s linear infinite;
  opacity: 0.6;
  will-change: transform, opacity;
}

@keyframes flotar {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.7; }
  90% { opacity: 0.7; }
  100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
}

.pantalla-inicio h1 {
  color: #ffaa33;
  font-size: clamp(28px, 10vw, 46px);
  text-shadow: 0 0 15px #ffaa33, 0 0 30px #ffdd66;
  margin-bottom: 25px;
  animation: brillar 4s ease-in-out infinite alternate;
  z-index: 10;
}

.pantalla-inicio p {
  color: #ffddaa;
  font-size: clamp(16px, 4vw, 20px);
  margin-bottom: 50px;
  text-shadow: 0 0 8px #ffaa33;
  z-index: 10;
  text-align: center;
  padding: 0 20px;
}

@keyframes brillar {
  from { filter: brightness(1); }
  to { filter: brightness(1.5); }
}

.boton-iniciar {
  padding: clamp(14px, 4vw, 18px) clamp(30px, 8vw, 45px);
  font-size: clamp(18px, 5vw, 24px);
  font-weight: bold;
  color: #ffffff;
  background: linear-gradient(45deg, #ff8822, #ffcc33);
  border: none;
  border-radius: 60px;
  box-shadow: 0 0 20px #ff8822, 0 0 40px rgba(255, 136, 34, 0.6);
  cursor: pointer;
  transition: all 0.3s ease;
  z-index: 10;
}

.boton-iniciar:hover, .boton-iniciar:active {
  transform: scale(1.05);
  box-shadow: 0 0 25px #ff8822, 0 0 50px rgba(255, 136, 34, 0.8);
}

/* ======================================
   ✨ PANTALLA PRINCIPAL
====================================== */
.contenido-principal {
  width: 100%;
  height: 100%;
  position: relative;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.8s ease;
  background: #000;
  overflow: hidden;
}

/* Fondo de galaxia */
.fondo-galaxia {
  width: 100%;
  height: 100%;
  background: radial-gradient(ellipse at center,
    #1a0033 0%,
    #220044 20%,
    #000022 40%,
    #000000 70%);
  position: absolute;
  top: 0;
  left: 0;
  overflow: hidden;
}

.nebulosa {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 30% 40%,
    rgba(255, 80, 30, 0.3) 0%,
    rgba(255, 120, 50, 0.15) 20%,
    rgba(80, 120, 255, 0.12) 40%,
    rgba(20, 200, 255, 0.08) 60%,
    transparent 80%),
  radial-gradient(circle at 70% 60%,
    rgba(255, 100, 40, 0.25) 0%,
    rgba(255, 150, 60, 0.12) 25%,
    rgba(255, 60, 180, 0.1) 50%,
    transparent 75%);
  filter: blur(15px);
  will-change: opacity;
}

.estrella-fondo {
  position: absolute;
  border-radius: 50%;
  background: #ffffff;
  will-change: opacity;
}

.texto-centro {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 20;
  width: 90%;
}

.frase-arriba {
  font-size: clamp(12px, 3vw, 14px);
  color: #ffddaa;
  margin-bottom: 15px;
  text-shadow: 0 0 5px #ff8822;
  opacity: 0.9;
}

.te-amo {
  font-size: clamp(32px, 12vw, 52px);
  font-weight: bold;
  color: #ffaa33;
  text-shadow:
    0 0 8px #ffaa33,
    0 0 16px #ffaa33,
    0 0 28px #ff8822,
    0 0 40px #ff6600;
  margin-bottom: 8px;
  animation: parpadearTexto 4s ease-in-out infinite alternate;
}

.sandra {
  font-size: clamp(36px, 14vw, 60px);
  font-weight: bold;
  color: #ffaa33;
  text-shadow:
    0 0 8px #ffaa33,
    0 0 16px #ffaa33,
    0 0 28px #ff8822,
    0 0 40px #ff6600;
  animation: parpadearTexto 4s ease-in-out infinite alternate;
}

@keyframes parpadearTexto {
  from { filter: brightness(1); }
  to { filter: brightness(1.4); }
}

/* ✅ FOTOS ADAPTADAS */
.foto {
  position: absolute;
  width: clamp(55px, 15vw, 65px);
  height: clamp(55px, 15vw, 65px);
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 0 12px #ffaa33, 0 0 24px rgba(255,170,51,0.5);
  z-index: 10;
  cursor: pointer;
  transition: transform 0.2s ease;
  will-change: transform, left, top;
}

.foto:hover, .foto:active {
  transform: scale(1.08);
}

.foto img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* ✅ FRASES CON CORAZONES Y MOVIMIENTO */
.frase-flotante {
  position: absolute;
  color: #ffffff;
  font-size: clamp(11px, 2.8vw, 13px);
  font-weight: 500;
  text-shadow: 0 0 6px #ffaa33, 0 0 12px rgba(255, 170, 51, 0.6);
  white-space: nowrap;
  z-index: 8;
  opacity: 0.9;
  user-select: none;
  will-change: left, top;
}

/* ✅ CORAZONES SUELTOS QUE FLOTAN */
.corazon-flotante {
  position: absolute;
  font-size: clamp(18px, 5vw, 22px);
  color: #ff4466;
  text-shadow: 0 0 8px #ff4466, 0 0 16px rgba(255, 68, 102, 0.7);
  z-index: 7;
  opacity: 0.8;
  user-select: none;
  will-change: left, top;
}

/* ✅ VENTANA DE FRASE AL HACER CLIC */
.ventana-frase {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  width: 90%;
  max-width: 450px;
  padding: clamp(20px, 5vw, 30px);
  background: rgba(10, 0, 30, 0.92);
  border: 2px solid #ffaa33;
  border-radius: 20px;
  box-shadow: 0 0 30px #ffaa33, 0 0 60px rgba(255, 136, 34, 0.6);
  text-align: center;
  z-index: 9999;
  transition: transform 0.4s ease;
}

.ventana-frase.activa {
  transform: translate(-50%, -50%) scale(1);
}

.ventana-frase p {
  color: #ffddaa;
  font-size: clamp(16px, 4vw, 20px);
  line-height: 1.6;
  text-shadow: 0 0 8px #ff8822;
}

.fondo-oscuro {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.75);
  z-index: 9998;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.4s ease;
}

.fondo-oscuro.activo {
  opacity: 1;
  visibility: visible;
}
</style>
</head>
<body>

<!-- 🎬 PANTALLA DE INICIO -->
<div class="pantalla-inicio" id="pantallaInicio">
  <div class="estrellas-portada" id="estrellasPortada"></div>
  <h1>Para ti ❤️</h1>
  <p>Un universo lleno de amor</p>
  <button class="boton-iniciar" id="botonIniciar">INICIAR</button>
</div>

<!-- ✨ PANTALLA PRINCIPAL -->
<div class="contenido-principal" id="contenidoPrincipal">
  <div class="fondo-galaxia">
    <div class="nebulosa"></div>
    <div id="estrellasGalaxia"></div>
  </div>

  <div class="texto-centro">
    <div class="frase-arriba">Contigo todo es mejor ❤️</div>
    <div class="te-amo">TE AMO</div>
    <div class="sandra">SANDRA</div>
  </div>

  <!-- Tus fotos con nombres correctos -->
  <div class="foto" id="img1"><img src="san 3.jpeg" alt="Recuerdo" loading="lazy"></div>
  <div class="foto" id="img2"><img src="san1.jpeg" alt="Recuerdo" loading="lazy"></div>
  <div class="foto" id="img3"><img src="san 2.jpeg" alt="Recuerdo" loading="lazy"></div>
  <div class="foto" id="img4"><img src="sam 5.jpeg" alt="Recuerdo" loading="lazy"></div>
  <div class="foto" id="img5"><img src="san6.jpeg" alt="Recuerdo" loading="lazy"></div>

  <!-- Elementos para la ventana de frases -->
  <div class="fondo-oscuro" id="fondoOscuro"></div>
  <div class="ventana-frase" id="ventanaFrase">
    <p id="textoFrase"></p>
  </div>
</div>

<script>
// 🎨 DECORACIÓN PORTADA (menos estrellas para mayor fluidez)
const contenedorEstrellas = document.getElementById("estrellasPortada");
for (let i = 0; i < 250; i++) {
  const estrella = document.createElement("div");
  estrella.classList.add("estrella");
  const tamaño = Math.random() * 2 + 0.5;
  estrella.style.width = tamaño + "px";
  estrella.style.height = tamaño + "px";
  estrella.style.left = Math.random() * 100 + "%";
  estrella.style.top = Math.random() * 100 + "%";
  estrella.style.animationDelay = Math.random() * 3 + "s";
  contenedorEstrellas.appendChild(estrella);
}

setInterval(() => {
  const corazon = document.createElement("div");
  corazon.classList.add("corazon-deco");
  corazon.textContent = "❤️";
  corazon.style.left = Math.random() * 100 + "%";
  corazon.style.fontSize = (Math.random() * 15 + 15) + "px";
  corazon.style.animationDuration = (Math.random() * 5 + 8) + "s";
  document.getElementById("pantallaInicio").appendChild(corazon);
  setTimeout(() => corazon.remove(), 12000);
}, 1200);

// 🎯 CAMBIO DE PANTALLA
const pantallaInicio = document.getElementById("pantallaInicio");
const contenidoPrincipal = document.getElementById("contenidoPrincipal");
const botonIniciar = document.getElementById("botonIniciar");

botonIniciar.addEventListener("click", () => {
  pantallaInicio.style.opacity = "0";
  setTimeout(() => {
    pantallaInicio.style.visibility = "hidden";
    contenidoPrincipal.style.opacity = "1";
    contenidoPrincipal.style.visibility = "visible";
    iniciarTodo();
  }, 800);
});

// ✨ ANIMACIONES Y FUNCIONES PRINCIPALES
function iniciarTodo() {
  // Crear estrellas de galaxia (reducidas para no trabar)
  const contenedorGalaxia = document.getElementById("estrellasGalaxia");
  for (let i = 0; i < 500; i++) {
    const estrella = document.createElement("div");
    estrella.classList.add("estrella-fondo");
    const tamaño = Math.random() * 2.5 + 0.3;
    estrella.style.width = tamaño + "px";
    estrella.style.height = tamaño + "px";
    estrella.style.left = Math.random() * 100 + "%";
    estrella.style.top = Math.random() * 100 + "%";
    estrella.style.opacity = Math.random() * 0.9 + 0.1;
    if (tamaño > 1.8) {
      estrella.style.boxShadow = `0 0 ${tamaño*3}px #fff`;
    }
    contenedorGalaxia.appendChild(estrella);
  }

  // 📸 MOVER FOTOS (límites ajustados para no salirse)
  const fotos = [
    {id: "img1", x: 12, y: 12, vx: 0.2, vy: 0.18},
    {id: "img2", x: 83, y: 15, vx: -0.19, vy: 0.22},
    {id: "img3", x: 15, y: 80, vx: 0.22, vy: -0.2},
    {id: "img4", x: 80, y: 75, vx: -0.2, vy: -0.2},
    {id: "img5", x: 50, y: 50, vx: 0.18, vy: -0.18}
  ];

  // 💬 FRASES CON CORAZONES
  const frasesActivas = [];
  const listaFrases = [
    "❤️ Te amo con todo mi corazón ❤️",
    "❤️ Eres mi universo ❤️",
    "❤️ Contigo todo es mejor ❤️",
    "❤️ Mi vida eres tú ❤️",
    "❤️ Eres mi sueño hecho realidad ❤️",
    "❤️ Iluminas mi camino ❤️",
    "❤️ Para siempre contigo ❤️",
    "❤️ Lo mejor que me pasó ❤️",
    "❤️ Mi lugar favorito es a tu lado ❤️",
    "❤️ Eres la razón de mi sonrisa ❤️",
    "❤️ Gracias por existir ❤️",
    "❤️ Eres mi paz y mi alegría ❤️",
    "❤️ Siempre en mi mente y en mi corazón ❤️",
    "❤️ Juntos es mi sitio favorito ❤️",
    "❤️ Amarte es lo más fácil del mundo ❤️"
  ];

  // ❤️ CORAZONES SUELTOS FLOTANTES
  const corazonesActivos = [];
  const tiposCorazon = ["❤️", "🧡", "💛", "💖", "💗"];

  // Crear elementos desde el inicio
  for (let i = 0; i < 5; i++) crearFrase();
  for (let i = 0; i < 8; i++) crearCorazon();

  // Renovar constantemente
  setInterval(crearFrase, 6000);
  setInterval(crearCorazon, 4000);

  function crearFrase() {
    const texto = listaFrases[Math.floor(Math.random() * listaFrases.length)];
    const nuevaFrase = document.createElement("div");
    nuevaFrase.className = "frase-flotante";
    nuevaFrase.textContent = texto;
    contenidoPrincipal.appendChild(nuevaFrase);

    const datos = {
      elem: nuevaFrase,
      x: Math.random() * 88 + 6,
      y: Math.random() * 88 + 6,
      vx: (Math.random() - 0.5) * 0.25,
      vy: (Math.random() - 0.5) * 0.25
    };
    frasesActivas.push(datos);

    setTimeout(() => {
      const idx = frasesActivas.indexOf(datos);
      if (idx !== -1) frasesActivas.splice(idx, 1);
      nuevaFrase.remove();
    }, 25000);
  }

  function crearCorazon() {
    const corazon = document.createElement("div");
    corazon.className = "corazon-flotante";
    corazon.textContent = tiposCorazon[Math.floor(Math.random() * tiposCorazon.length)];
    corazon.style.fontSize = `${Math.random() * 10 + 16}px`;
    contenidoPrincipal.appendChild(corazon);

    const datos = {
      elem: corazon,
      x: Math.random() * 92 + 4,
      y: Math.random() * 92 + 4,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3
    };
    corazonesActivos.push(datos);

    setTimeout(() => {
      const idx = corazonesActivos.indexOf(datos);
      if (idx !== -1) corazonesActivos.splice(idx, 1);
      corazon.remove();
    }, 20000);
  }

  // 🎮 ANIMACIÓN GENERAL
  function animarTodo() {
    // Mover fotos
    fotos.forEach(f => {
      f.x += f.vx;
      f.y += f.vy;
      if (f.x <= 3 || f.x >= 94) f.vx *= -1;
      if (f.y <= 3 || f.y >= 94) f.vy *= -1;
      document.getElementById(f.id).style.left = f.x + "%";
      document.getElementById(f.id).style.top = f.y + "%";
    });

    // Mover frases
    frasesActivas.forEach(f => {
      f.x += f.vx;
      f.y += f.vy;
      if (f.x <= 2 || f.x >= 96) f.vx *= -1;
      if (f.y <= 2 || f.y >= 96) f.vy *= -1;
      f.elem.style.left = f.x + "%";
      f.elem.style.top = f.y + "%";
    });

    // Mover corazones sueltos
    corazonesActivos.forEach(c => {
      c.x += c.vx;
      c.y += c.vy;
      if (c.x <= 2 || c.x >= 97) c.vx *= -1;
      if (c.y <= 2 || c.y >= 97) c.vy *= -1;
      c.elem.style.left = c.x + "%";
      c.elem.style.top = c.y + "%";
    });

    requestAnimationFrame(animarTodo);
  }
  animarTodo();

  // ✅ FRASES PARA MOSTRAR AL HACER CLIC EN LAS FOTOS
  const frasesVentana = [
    "❤️ Te amo más de lo que las palabras pueden explicar ❤️",
    "❤️ Eres lo mejor que me ha pasado en la vida ❤️",
    "❤️ Contigo cada día es una nueva aventura llena de felicidad ❤️",
    "❤️ Mi corazón es y siempre será solo tuyo ❤️",
    "❤️ Eres mi sueño hecho realidad, mi amor eterno ❤️",
    "❤️ Gracias por iluminar mi mundo con tu sonrisa ❤️",
    "❤️ A tu lado todo tiene más sentido y más color ❤️",
    "❤️ Te elegiría una y mil veces más, sin dudarlo ❤️"
  ];

  const fondoOscuro = document.getElementById("fondoOscuro");
  const ventanaFrase = document.getElementById("ventanaFrase");
  const textoFrase = document.getElementById("textoFrase");

  document.querySelectorAll(".foto").forEach(foto => {
    foto.addEventListener("click", () => {
      const fraseAleatoria = frasesVentana[Math.floor(Math.random() * frasesVentana.length)];
      textoFrase.textContent = fraseAleatoria;
      fondoOscuro.classList.add("activo");
      ventanaFrase.classList.add("activa");
    });
  });

  fondoOscuro.addEventListener("click", () => {
    fondoOscuro.classList.remove("activo");
    ventanaFrase.classList.remove("activa");
  });
}
</script>

</body>
</html>
