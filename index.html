<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia 3D</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial, sans-serif;
}

.scene {
  width: 100vw;
  height: 100vh;
  perspective: 1200px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.galaxy {
  position: relative;
  width: 300px;
  height: 300px;
  transform-style: preserve-3d;
  animation: rotate 20s infinite linear;
}

@keyframes rotate {
  from { transform: rotateY(0deg) rotateX(10deg); }
  to { transform: rotateY(360deg) rotateX(10deg); }
}

.photo {
  position: absolute;
  width: 120px;
  height: 120px;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 0 20px white;
}

.photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.center-text {
  position: absolute;
  color: white;
  font-size: 28px;
  font-weight: bold;
  text-align: center;
  width: 200px;
  transform: translate(-50%, -50%);
  left: 50%;
  top: 50%;
  text-shadow: 0 0 15px pink, 0 0 30px purple;
}
</style>
</head>

<body>

<div class="scene">
  <div class="galaxy">

    <div class="center-text">TE AMO SANDRA 💖</div>

    <div class="photo" style="transform: rotateY(0deg) translateZ(300px);">
      <img src="san 3.jpeg">
    </div>

    <div class="photo" style="transform: rotateY(72deg) translateZ(300px);">
      <img src="sam 5.jpeg">
    </div>

    <div class="photo" style="transform: rotateY(144deg) translateZ(300px);">
      <img src="san1.jpeg">
    </div>

    <div class="photo" style="transform: rotateY(216deg) translateZ(300px);">
      <img src="san 2.jpeg">
    </div>

    <div class="photo" style="transform: rotateY(288deg) translateZ(300px);">
      <img src="san6.jpeg">
    </div>

  </div>
</div>

</body>
</html>
